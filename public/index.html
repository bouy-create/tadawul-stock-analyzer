<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saudi Stock Analyzer</title>
<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}
input{
padding:10px;
font-size:18px;
width:200px;
}
button{
padding:10px;
font-size:18px;
cursor:pointer;
}
.result{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;
display:inline-block;
}
</style>
</head>

<body>

<h1>Saudi Stock Analyzer</h1>

<p>اكتب رمز الشركة مثل 2222</p>

<input id="symbol" placeholder="Ticker">
<button onclick="search()">Search</button>

<div id="result"></div>

<script>
async function search(){

let symbol = document.getElementById("symbol").value

let url = "/api/company/"+symbol

let r = await fetch(url)

let data = await r.json()

document.getElementById("result").innerHTML =
`
<div class="result">
<h2>${data.name}</h2>
<p>Symbol: ${data.symbol}</p>
<p>Price: ${data.price}</p>
<p>P/E: ${data.pe}</p>
</div>
`
}
</script>

</body>
</html>
